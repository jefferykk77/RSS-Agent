<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f7f9fc">
    <title>RSS Agent</title>
    <link rel="preconnect" href="https://unpkg.com">
    <script defer src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="/styles.css">
    <script defer src="/app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="global-bar">
        <div class="global-bar__start">
          <button id="nav-toggle" class="icon-button mobile-only" type="button" aria-label="打开导航" data-tooltip="打开导航">
            <i data-lucide="panel-left-open"></i>
          </button>
          <a class="brand" href="/" aria-label="RSS Agent 首页">
            <span class="brand-mark" aria-hidden="true">R</span>
            <span>RSS Agent</span>
          </a>
        </div>
        <div class="global-bar__status" aria-live="polite">
          <span class="status-dot"></span>
          <span id="run-status">本地工作台</span>
        </div>
        <div class="global-bar__actions">
		  <button id="ingest-trigger" class="shortcut-button" type="button" aria-label="投喂链接">
			<i data-lucide="link-2"></i><span class="shortcut-button__label">投喂</span>
		  </button>
          <button id="command-trigger" class="shortcut-button" type="button" aria-label="打开命令面板">
            <i data-lucide="search"></i>
            <span class="shortcut-button__label">命令</span>
            <kbd>Ctrl K</kbd>
          </button>
          <button id="run-button" class="primary-button" type="button">
            <i data-lucide="play"></i>
            <span>立即运行</span>
          </button>
        </div>
      </header>

      <div class="workspace">
        <aside id="nav-pane" class="nav-pane" aria-label="工作区导航">
          <div class="profile-control">
            <label for="profile-select">当前 Profile</label>
            <div class="select-wrap">
              <select id="profile-select" aria-label="选择 Profile"></select>
              <i data-lucide="chevrons-up-down" aria-hidden="true"></i>
            </div>
          </div>

          <nav class="primary-nav" aria-label="主要视图">
            <button class="nav-item is-active" type="button" data-filter="all">
              <i data-lucide="inbox"></i>
              <span>今日 Digest</span>
              <span id="digest-count" class="nav-count">0</span>
            </button>
            <button class="nav-item" type="button" data-filter="saved">
              <i data-lucide="bookmark"></i>
              <span>已收藏</span>
            </button>
            <button class="nav-item" type="button" data-filter="later">
              <i data-lucide="clock-3"></i>
              <span>稍后阅读</span>
            </button>
          </nav>

          <section class="source-section" aria-labelledby="source-heading">
            <div class="section-heading">
              <h2 id="source-heading">订阅源</h2>
              <button class="icon-button" type="button" aria-label="订阅源管理尚未接入" data-tooltip="订阅源管理尚未接入" disabled>
                <i data-lucide="plus"></i>
              </button>
            </div>
            <ul id="source-list" class="source-list"></ul>
          </section>

          <footer class="nav-footer">
            <span id="source-health" class="quiet-status"><i data-lucide="radio"></i> 本地 SQLite</span>
          </footer>
        </aside>

        <main class="digest-pane" aria-label="Digest 条目">
          <header class="pane-header digest-header">
            <div>
              <p class="eyebrow">QUEUE</p>
              <h1>今日 Digest</h1>
            </div>
			<div class="digest-history"><select id="edition-select" aria-label="选择历史 Digest"><option value="">当前情报库</option></select><div id="digest-meta" class="digest-meta"></div></div>
          </header>

          <div class="digest-tools">
            <label class="search-field" for="digest-search">
              <i data-lucide="search" aria-hidden="true"></i>
              <input id="digest-search" type="search" autocomplete="off" placeholder="搜索标题、来源和标签">
              <kbd>/</kbd>
            </label>
            <div class="tab-list" role="tablist" aria-label="Digest 筛选">
              <button class="tab is-active" type="button" role="tab" aria-selected="true" data-view="all">全部</button>
              <button class="tab" type="button" role="tab" aria-selected="false" data-view="recommended">推荐</button>
              <button class="tab" type="button" role="tab" aria-selected="false" data-view="delivered">已推送</button>
            </div>
			<label class="topic-filter" for="topic-select">
			  <span>主题</span>
			  <select id="topic-select">
				<option value="">全部</option>
				<option value="paradigm">新范式</option>
				<option value="codex">Codex</option>
				<option value="skills">Skills / MCP</option>
				<option value="model">模型与基础设施</option>
				<option value="frontend">前端实践</option>
			  </select>
			</label>
          </div>

          <div id="digest-list" class="digest-list" role="listbox" aria-label="文章列表" aria-busy="true"></div>
        </main>

        <aside id="detail-pane" class="detail-pane" aria-label="条目详情">
          <div id="detail-empty" class="detail-empty">
            <i data-lucide="panel-right-open" aria-hidden="true"></i>
            <p>从 Digest 选择一条内容</p>
          </div>
          <article id="detail-content" class="detail-content" hidden></article>
        </aside>
      </div>
    </div>

    <dialog id="command-dialog" class="command-dialog" aria-label="命令面板">
      <form method="dialog" class="command-dialog__surface">
        <div class="command-search">
          <i data-lucide="search" aria-hidden="true"></i>
          <input id="command-search" type="search" placeholder="搜索命令" autocomplete="off">
          <kbd>Esc</kbd>
        </div>
        <div id="command-list" class="command-list" role="listbox"></div>
      </form>
    </dialog>

	<dialog id="ingest-dialog" class="command-dialog ingest-dialog" aria-label="投喂内容">
	  <form id="ingest-form" class="command-dialog__surface ingest-form">
		<header><div><p class="eyebrow">INTEREST SAMPLE</p><h2>投喂内容</h2></div><button class="icon-button" type="button" data-close-ingest aria-label="关闭"><i data-lucide="x"></i></button></header>
		<label>链接<input name="url" type="url" required placeholder="https://..."></label>
		<label>标题（页面无法读取时填写）<input name="title" type="text" placeholder="文章或项目标题"></label>
		<label>正文或补充说明（可选）<textarea name="content" rows="6" placeholder="粘贴正文，或说明为什么希望看到同类内容"></textarea></label>
		<label>标签（逗号分隔）<input name="tags" type="text" placeholder="loop engineering, codex, mcp"></label>
		<footer><button class="secondary-button" type="button" data-close-ingest>取消</button><button class="primary-button" type="submit"><i data-lucide="plus"></i><span>加入情报库</span></button></footer>
	  </form>
	</dialog>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
  </body>
</html>
