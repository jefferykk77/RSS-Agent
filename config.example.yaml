profile:
    language: zh-CN
    timezone: Asia/Shanghai
    interests:
        - AI 前沿工程范式、Applied AI Engineering、模型与基础设施
        - Codex 工作流、Skills、MCP 和能立即尝试的高质量实践
        - 能被 Codex 直接消费并展示真实效果的前端实践
    must_include: []
    exclude:
        - 纯融资新闻
        - 标题党营销稿
    priority_terms:
        - Codex
        - loop engineering
        - harness engineering
        - context engineering
        - applied AI engineering
        - MCP
        - Skills
    muted_feeds: []
    muted_tags: []
    notes: Coding Agent 只重点追踪 Codex；偏好一手来源、亲身实践、通俗解释和可立即行动的内容。
models:
    primary:
        label: glm-5.2
        provider: ark
        base_url: https://ark.cn-beijing.volces.com/api/v3
        api_key: ""
        api_key_env: ARK_API_KEY
        name: ${ARK_MODEL}
        timeout: 60s
        temperature: 0.2
        max_tokens: 2400
        input_price_cny_per_million: 0
        output_price_cny_per_million: 0
        free_daily_tokens: 2000000
    fallback:
        - label: deepseek-v4-flash
          provider: deepseek
          base_url: https://api.deepseek.com
          api_key: ""
          api_key_env: DEEPSEEK_API_KEY
          name: ${DEEPSEEK_MODEL}
          timeout: 60s
          temperature: 0.2
          max_tokens: 1200
          input_price_cny_per_million: 0.95
          output_price_cny_per_million: 1.9
          free_daily_tokens: 0
settings:
    interval: 1h
    http_timeout: 20s
    lookback_hours: 72
    max_items_per_feed: 20
    batch_size: 8
    min_score: 7
    max_pushes: 6
    max_candidates_per_run: 0
    initial_items_per_feed: 10
    analysis_rpm: 400
    analysis_tpm: 800000
    initial_token_budget: 700000
    analysis_cache_ttl: 24h
    analysis_prompt_version: ai-frontier-v2
    full_text_min_chars: 600
    full_text_max_chars: 8000
database:
    path: .rss-agent/rss-agent.db
budget:
    monthly_cny: 20
    llm_monthly_cny: 5
    x_monthly_cny: 10
    hard_stop_cny: 19
    stop_when_free_quota_missing: false
    warn_when_used_ratio: 0.8
push:
    console: true
    webhook_url: ""
    webhook_url_env: RSS_AGENT_WEBHOOK_URL
    feishu:
        webhook_url: ""
        webhook_url_env: FEISHU_WEBHOOK_URL
    dingtalk:
        webhook_url: ""
        webhook_url_env: DINGTALK_WEBHOOK_URL
    telegram:
        bot_token: ""
        bot_token_env: TELEGRAM_BOT_TOKEN
        chat_id: ""
        chat_id_env: TELEGRAM_CHAT_ID
    email:
        smtp_host: ""
        smtp_port: 587
        username: ""
        username_env: RSS_AGENT_SMTP_USERNAME
        password: ""
        password_env: RSS_AGENT_SMTP_PASSWORD
        from: ""
        to: []
        subject: RSS Agent Digest
        start_tls: true
digest:
    times:
        - "08:00"
        - "20:00"
    daily_limit: 12
    per_run_limit: 6
feeds:
    - name: OpenAI News
      url: https://openai.com/news/rss.xml
      tags:
        - primary
        - openai
        - codex
      disabled: false
    - name: Latent Space
      url: https://www.latent.space/feed
      tags:
        - primary
        - applied-ai
        - paradigm
      disabled: false
    - name: Reddit · Claude Engineering
      url: https://www.reddit.com/r/ClaudeCode+ClaudeAI+ClaudeWorkflows/new/.rss
      tags:
        - community
        - claude-code
        - applied-ai
      disabled: false
    - name: Hugging Face Blog
      url: https://huggingface.co/blog/feed.xml
      tags:
        - primary
        - model-infra
        - applied-ai
      disabled: false
    - name: Google DeepMind
      url: https://deepmind.google/blog/rss.xml
      tags:
        - primary
        - research
        - model-infra
      disabled: false
    - name: HN · AI Engineering
      url: https://hnrss.org/newest?q=%22AI+agent%22+OR+%22loop+engineering%22+OR+%22harness+engineering%22+OR+%22context+engineering%22
      tags:
        - community
        - paradigm
        - applied-ai
      disabled: false
x:
    base_url: https://api.x.com/2
    bearer_token: ""
    bearer_token_env: X_BEARER_TOKEN
    searches:
        - name: X AI · Research & Builders
          query: '(AI OR "AI agent" OR LLM OR "foundation model") lang:en -is:retweet'
          tags:
              - ai
              - x
          max_results: 20
          disabled: true
state:
    path: .rss-agent/state.json
profiles:
    product:
        profile:
            language: zh-CN
            timezone: Asia/Shanghai
            interests:
                - AI 产品策略、开发者工具、产品增长与竞品动态
            must_include: []
            exclude:
                - 纯融资新闻
                - 标题党营销稿
            priority_terms:
                - AI
                - Agent
                - product
                - developer tools
            muted_feeds: []
            muted_tags: []
            notes: 偏好产品方向、用户价值和可验证的市场信号。
        push:
            console: true
            webhook_url: ""
            webhook_url_env: RSS_AGENT_WEBHOOK_URL
        feeds:
            - name: Go Blog
              url: https://go.dev/blog/feed.atom
              tags:
                - product
                - developer-tools
              disabled: false
